<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ViewMovie — Movie Reviews</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">🎬 ViewMovie</h1>
      <p class="tagline">Honest reviews. No spoilers, promise.</p>
    </div>
  </header>

  <!-- ===== SEARCH / FILTER BAR ===== -->
  <section class="controls">
    <input type="text" id="searchInput" placeholder="Search movies..." />

    <select id="genreFilter">
      <option value="all">All Genres</option>
      <option value="Action">Action</option>
      <option value="Drama">Drama</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Comedy">Comedy</option>
      <option value="Thriller">Thriller</option>
    </select>
  </section>

  <!-- ===== MOVIE GRID ===== -->
  <main class="movie-grid" id="movieGrid">
    <!-- Movie cards are added here automatically by script.js -->
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>Made with 🍿 by a BCA student learning web dev</p>
  </footer>

  <!-- ===== MOVIE DETAIL / REVIEW MODAL ===== -->
  <!-- Hidden by default. script.js fills this in and shows it on click. -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&times;</button>

      <img class="modal-poster" id="modalPoster" src="" alt="" />
      <h2 id="modalTitle"></h2>
      <p class="movie-meta" id="modalMeta"></p>
      <p class="movie-review" id="modalOriginalReview"></p>

      <hr class="modal-divider" />

      <h3>Your Reviews</h3>
      <div id="modalUserReviews">
        <!-- User-submitted reviews are listed here -->
      </div>

      <hr class="modal-divider" />

      <h3>Add Your Review</h3>
      <form id="reviewForm">
        <input type="text" id="reviewerName" placeholder="Your name" required />
        <textarea id="reviewerText" placeholder="What did you think of this movie?" required></textarea>
        <button type="submit">Post Review</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
